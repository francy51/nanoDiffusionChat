model:
  vocab_size: 50257
  hidden_dim: 768
  num_layers: 12
  num_heads: 12
  max_seq_len: 512
  dropout: 0.1

training:
  batch_size: 16
  learning_rate: 0.0001
  max_steps: 200000
  warmup_steps: 2000
  weight_decay: 0.01
  grad_clip: 1.0
  eval_interval: 1000
  checkpoint_interval: 10000
  log_interval: 100
  num_workers: 4

diffusion:
  num_steps: 256
  schedule: uniform
  mask_token_id: 50256

data:
  dataset_name: tinystories
  seq_len: 512
  train_split: 0.95
  tokenizer_name: gpt2
