model:
  vocab_size: 50257
  hidden_dim: 512
  num_layers: 6
  num_heads: 8
  max_seq_len: 512
  dropout: 0.1

training:
  batch_size: 32
  learning_rate: 0.0001
  max_steps: 100000
  warmup_steps: 1000
  weight_decay: 0.01
  grad_clip: 1.0
  eval_interval: 500
  checkpoint_interval: 5000
  log_interval: 100
  num_workers: 4

diffusion:
  num_steps: 256
  schedule: uniform
  mask_token_id: 50256

data:
  dataset_name: tinystories
  seq_len: 512
  train_split: 0.95
  tokenizer_name: gpt2
